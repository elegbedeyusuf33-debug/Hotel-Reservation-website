


{%extends "base.html"%}
{%load static%}
{%block home_pagecontent%}
{% if validlink %}
<h2>Enter New Password</h2>
<form method="POST">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" style="background:#FFD700; color:black; width:100px; height:30px; border:solid 1px orange; border-radius:10px;">Change Password</button>
</form>
{% else %}
<p>The password reset link was invalid, possibly because it has already been used. Please request a new password reset.</p>
{% endif %}

{% endblock %}
